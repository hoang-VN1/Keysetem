<!-- ===== BỔ SUNG IPA: KHÔNG SỬA CODE GỐC, GIỮ NGUYÊN UI ===== -->
<script>
(function() {
    // ---- TẠO ID THIẾT BỊ DUY NHẤT ----
    function generateDeviceId() {
        const info = [
            navigator.userAgent,
            navigator.language,
            navigator.platform,
            screen.width + 'x' + screen.height,
            screen.colorDepth,
            navigator.hardwareConcurrency || 0,
            navigator.deviceMemory || 0,
            new Date().getTimezoneOffset()
        ].join('|');
        let hash = 0;
        for (let i = 0; i < info.length; i++) {
            hash = ((hash << 5) - hash) + info.charCodeAt(i);
            hash = hash & hash;
        }
        return 'DEV_' + Math.abs(hash).toString(36).toUpperCase();
    }

    // ---- MÃ HÓA/GIẢI MÃ DEVICE ID ----
    function encodeDeviceId(deviceId) {
        return btoa(deviceId).replace(/=/g, '').slice(0, 12);
    }

    function decodeDeviceFromKey(key) {
        try {
            const parts = key.split('_');
            if (parts.length < 3) return null;
            let encoded = parts[1];
            while (encoded.length % 4 !== 0) encoded += '=';
            return atob(encoded);
        } catch(e) { return null; }
    }

    // ---- TẠO KEY GẮN THIẾT BỊ ----
    function generateDeviceKey(deviceId) {
        const prefix = 'HOANG';
        const encoded = encodeDeviceId(deviceId);
        const random = Math.random().toString(36).substring(2, 6).toUpperCase();
        return prefix + '_' + encoded + '_' + random;
    }

    // ---- LẤY HOẶC TẠO DEVICE ID ----
    let currentDeviceId = localStorage.getItem('deviceId_hoang');
    if (!currentDeviceId) {
        currentDeviceId = generateDeviceId();
        localStorage.setItem('deviceId_hoang', currentDeviceId);
    }

    // ---- KIỂM TRA VÀ CẬP NHẬT KEY HIỆN TẠI (NẾU CẦN) ----
    let currentKey = localStorage.getItem('realkid_key') || '';
    if (currentKey) {
        const decoded = decodeDeviceFromKey(currentKey);
        if (!decoded || decoded !== currentDeviceId) {
            // Key không khớp thiết bị → tạo key mới nhưng KHÔNG can thiệp UI
            const newKey = generateDeviceKey(currentDeviceId);
            localStorage.setItem('realkid_key', newKey);
            // Cập nhật expiry để đồng bộ với code gốc
            const expiry = Date.now() + 3 * 24 * 60 * 60 * 1000;
            localStorage.setItem('realkid_expiry', String(expiry));
            console.log('🔑 IPA: Đã tạo key mới gắn thiết bị:', newKey);
        }
    } else {
        // Chưa có key → tạo mới
        const newKey = generateDeviceKey(currentDeviceId);
        localStorage.setItem('realkid_key', newKey);
        const expiry = Date.now() + 3 * 24 * 60 * 60 * 1000;
        localStorage.setItem('realkid_expiry', String(expiry));
        console.log('🔑 IPA: Đã tạo key mới gắn thiết bị:', newKey);
    }

    // ---- GHIM LẠI HÀM TẠO KEY MỚI (KHÔNG SỬA CODE GỐC, CHỈ BỔ SUNG) ----
    const originalCreateNewKey = window.createNewKey;
    window.createNewKey = function() {
        // Gọi hàm gốc nếu tồn tại (để giữ nguyên logic UI)
        if (typeof originalCreateNewKey === 'function') {
            originalCreateNewKey();
        }
        // Sau đó ghi đè key bằng key gắn thiết bị
        const deviceKey = generateDeviceKey(currentDeviceId);
        localStorage.setItem('realkid_key', deviceKey);
        const expiry = Date.now() + 3 * 24 * 60 * 60 * 1000;
        localStorage.setItem('realkid_expiry', String(expiry));
        // Cập nhật hiển thị (nếu có) mà không phá UI
        const accessKeyEl = document.getElementById('accessKey');
        if (accessKeyEl) accessKeyEl.textContent = deviceKey;
        console.log('🔑 IPA: Key mới gắn thiết bị:', deviceKey);
        return deviceKey;
    };

    // ---- THÊM THÔNG BÁO TRẠNG THÁI THIẾT BỊ (KHÔNG ẢNH HƯỞNG UI CHÍNH) ----
    const statusRow = document.querySelector('.status-row');
    if (statusRow) {
        const deviceInfo = document.createElement('span');
        deviceInfo.style.cssText = 'color:#4a5a7a;font-size:10px;border-left:1px solid #2a3455;padding-left:8px;margin-left:4px;';
        deviceInfo.textContent = '🖥️ ' + currentDeviceId.slice(0, 8) + '...';
        statusRow.appendChild(deviceInfo);
    }

    console.log('✅ IPA Bổ sung hoàn tất. Device ID:', currentDeviceId);
    console.log('🔑 Key hiện tại:', localStorage.getItem('realkid_key'));
})();
</script>
